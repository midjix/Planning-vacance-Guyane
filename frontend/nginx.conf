server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy les appels API vers le backend
    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Uploads volumineux (photos/vidéos). NB: le tunnel Cloudflare plafonne
        # chaque requête à 100 Mo -> les très gros fichiers passent par un upload
        # en morceaux (chaque morceau reste sous cette limite).
        client_max_body_size 100m;
        # Laisse le corps de requête circuler vers le backend sans le bufferiser
        # entièrement d'abord (progression d'upload plus fidèle).
        proxy_request_buffering off;
        # Marge de temps pour les transferts lents (connexions mobiles).
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Pour le SPA React : redirige tout vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
