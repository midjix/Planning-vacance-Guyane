version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}

  frontend:
    build: ./frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
