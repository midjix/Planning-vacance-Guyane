version: '3.8'

services:
  backend:
    # Remplace <TON_NOM_UTILISATEUR> par ton nom d'utilisateur GitHub
    # L'image doit être publiée sur GitHub Container Registry (ghcr.io)
    image: ghcr.io/midjix/voyage-guyane-backend:latest
    container_name: voyage-guyane-backend
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      # Valeurs lues depuis le fichier .env placé à côté de ce docker-compose.nas.yml
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_DEFAULT_PASSWORD=${ADMIN_DEFAULT_PASSWORD}
      - MEDIA_ENCRYPTION_KEY=${MEDIA_ENCRYPTION_KEY}
    volumes:
      # Persiste les données modifiées via l'admin (sinon perdues à chaque mise à jour)
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    image: ghcr.io/midjix/voyage-guyane-frontend:latest
    container_name: voyage-guyane-frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Watchtower s'occupe de vérifier s'il y a de nouvelles images sur GitHub
  # et de redémarrer automatiquement les conteneurs avec la nouvelle version.
  # NB: on utilise le fork maintenu nickfedor/watchtower — l'image d'origine
  # containrrr/watchtower n'est plus mise à jour et est incompatible avec les
  # démons Docker récents (erreur "client version 1.25 is too old").
  watchtower:
    image: nickfedor/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Vérifie les mises à jour toutes les heures (3600 secondes)
    # Tu peux ajuster ce délai selon tes besoins (ex: 300 pour 5 min)
    command: --interval 30 voyage-guyane-backend voyage-guyane-frontend
    restart: unless-stopped
    # Décommente et remplis ces lignes si ton dépôt GitHub est PRIVÉ
    # environment:
    #   - REPO_USER=<TON_NOM_UTILISATEUR>
    #   - REPO_PASS=<TON_TOKEN_GITHUB_CLASSIC>

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: tunnel
    restart: unless-stopped
    # Token lu depuis le fichier .env placé à côté de ce docker-compose.nas.yml
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  backend-data:
