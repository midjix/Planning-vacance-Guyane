name: Deploy to NAS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Ces permissions sont obligatoires pour que GitHub Actions puisse publier sur le registre GitHub (ghcr.io)
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ghcr.io/midjix/voyage-guyane-backend:latest ./backend
          docker push ghcr.io/midjix/voyage-guyane-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build \
            --build-arg APP_VERSION=${GITHUB_SHA::7} \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%d %H:%M UTC')" \
            -t ghcr.io/midjix/voyage-guyane-frontend:latest ./frontend
          docker push ghcr.io/midjix/voyage-guyane-frontend:latest
